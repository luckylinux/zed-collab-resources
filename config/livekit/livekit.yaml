# Main TCP port for RoomService and RTC endpoint
# for production setups, this port should be placed behind a load balancer with TLS
port: 7880

# Log Level
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000

  # use_external_ip should be set to true for most cloud environments where
  # the host has a public IP address, but is not exposed to the process.
  # LiveKit will attempt to use STUN to discover the true IP, and advertise
  # that IP with its clients
  use_external_ip: false

redis:
  # Redis is recommended for Production Deployments
  address: zed-livekit-redis:6380
  password: XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
  db: 0

keys:
  # ZED-Server
  # Must match Server's LIVEKIT_KEY=APIXXXXXXXXXXXX and LIVEKIT_SECRET=YYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYY inside zed-server Environment
  APIXXXXXXXXXXXX: YYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYY

# Prometheus
# When enabled, LiveKit will expose prometheus metrics on :6789/metrics
#prometheus_port: 6789

# TURN
# turn:
#  enabled: true
#  # domain must match tls certificate
#  domain: <turn.myhost.com>
#  # defaults to 3478. If not using a load balancer, must be set to 443.
#  tls_port: 3478
